# agentsh Server Configuration for Render
# Landlock (kernel path restrictions) + seccomp file_monitor (policy enforcement)
# Optimized via agentsh detect config on Render (kernel 6.8.0-1046-aws)

server:
  http:
    addr: "127.0.0.1:18080"
    read_timeout: "30s"
    write_timeout: "120s"
    max_request_size: "10MB"
  grpc:
    enabled: true
    addr: "127.0.0.1:9090"

auth:
  type: "none"

logging:
  level: "info"
  format: "text"
  output: "stderr"

sessions:
  base_dir: "/var/lib/agentsh/sessions"
  max_sessions: 50
  default_timeout: "1h"
  default_idle_timeout: "15m"
  cleanup_interval: "5m"

audit:
  enabled: true
  storage:
    sqlite_path: "/var/lib/agentsh/events.db"

sandbox:
  enabled: true
  allow_degraded: true

  limits:
    max_memory_mb: 2048
    max_cpu_percent: 100
    max_processes: 100

  fuse:
    enabled: false

  network:
    enabled: true
    intercept_mode: "all"
    proxy_listen_addr: "127.0.0.1:0"

  cgroups:
    enabled: false

  unix_sockets:
    enabled: false

  seccomp:
    enabled: true
    mode: "enforce"
    execve:
      enabled: false
    file_monitor:
      enabled: true
      enforce_without_fuse: true

  # Landlock kernel enforcement (ABI v5 on Render)
  # allow_execute lets the shell shim at /bin/bash run
  landlock:
    enabled: true
    allow_execute:
      - /usr/bin
      - /bin
      - /usr/local/bin
      - /usr/sbin
      - /sbin
      - /usr/lib
      - /lib
    network:
      allow_connect_tcp: true
      allow_bind_tcp: false

  # BASH_ENV disables dangerous builtins (kill, enable, ulimit, etc.)
  env_inject:
    AGENTSH_SERVER: "http://127.0.0.1:18080"
    BASH_ENV: "/usr/lib/agentsh/bash_startup.sh"

  # ptrace not available on Render (no SYS_PTRACE) but fail_open
  # enables graceful degradation to seccomp file_monitor for policy enforcement
  ptrace:
    enabled: true
    attach_mode: "children"
    on_attach_failure: "fail_open"
    mask_tracer_pid: "off"
    trace:
      execve: true
      file: true
      network: true
      signal: true
    performance:
      seccomp_prefilter: true
      max_tracees: 100
      max_hold_ms: 5000

policies:
  dir: "/etc/agentsh/policies"
  default_policy: "default"

approvals:
  enabled: false

dlp:
  mode: "redact"
  patterns:
    email: true
    phone: true
    credit_card: true
    ssn: true
    api_keys: true
  custom_patterns:
    - name: openai_key
      display: "[OPENAI_KEY]"
      regex: "sk-[a-zA-Z0-9]{48,}"
    - name: anthropic_key
      display: "[ANTHROPIC_KEY]"
      regex: "sk-ant-[a-zA-Z0-9-]{95,}"
    - name: aws_access_key
      display: "[AWS_KEY]"
      regex: "AKIA[0-9A-Z]{16}"
    - name: github_pat
      display: "[GITHUB_TOKEN]"
      regex: "ghp_[a-zA-Z0-9]{36}"
    - name: github_oauth
      display: "[GITHUB_OAUTH]"
      regex: "gho_[a-zA-Z0-9]{36}"
    - name: jwt_token
      display: "[JWT]"
      regex: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    - name: private_key
      display: "[PRIVATE_KEY]"
      regex: "-----BEGIN [A-Z]+ PRIVATE KEY-----"
    - name: slack_token
      display: "[SLACK_TOKEN]"
      regex: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}"

health:
  path: "/health"

development:
  disable_auth: true
  verbose_errors: true
